syntax = "proto3";

package billing;

option go_package = "./proto";

service BillingService {
  rpc CreateCheckoutSession(CreateCheckoutSessionRequest)
      returns (CreateCheckoutSessionResponse);

  rpc CreatePortalSession(CreatePortalSessionRequest)
      returns (CreatePortalSessionResponse);

  rpc GetUserSubscription(GetUserSubscriptionRequest)
      returns (GetUserSubscriptionResponse);
}

message CreateCheckoutSessionRequest {
  string user_id = 1;
  string plan = 2;
}

message CreateCheckoutSessionResponse {
  string checkout_url = 1;
}

message CreatePortalSessionRequest {
  string user_id = 1;
}

message CreatePortalSessionResponse {
  string portal_url = 1;
}

message GetUserSubscriptionRequest {
  string user_id = 1;
}

message GetUserSubscriptionResponse {
  string plan = 1;
  string status = 2;
}